name: GitHub Trend Monitor

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # manual trigger from Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push state.json back

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trend agent
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          LANGUAGES: ${{ vars.LANGUAGES }}
          HN_MIN_SCORE: ${{ vars.HN_MIN_SCORE }}
          ISSUE_MIN_COMMENTS: ${{ vars.ISSUE_MIN_COMMENTS }}
        run: python main.py

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
